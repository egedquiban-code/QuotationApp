<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Generator App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .services-section {
            padding: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '👨‍💼';
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #4facfe;
            font-weight: 600;
        }

        .service-grid {
            display: block;
            width: 100%;
            margin-bottom: 30px;
        }

        .category {
            margin-bottom: 30px;
        }

        .category-items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .category h3 {
            position: relative;
            font-size: 1.16rem;
            color: #0f2c60;
            margin-bottom: 15px;
            font-weight: 700;
            padding-left: 14px;
        }

        .category h3::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 4px;
        }

        .service-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 18px;
            padding: 18px 14px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            min-width: 170px;
            max-width: calc(50% - 7.5px);
        }

        .service-btn:hover {
            background: #d7edff;
            color: #0f2c60;
            border-color: #8fcdfd;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(79, 172, 254, 0.18);
        }

        @media (max-width: 760px) {
            .service-btn {
                max-width: 100%;
            }
        }

        .service-btn.active {
            background: #00f2fe;
            color: white;
            border-color: #00f2fe;
            transform: scale(1.05);
        }

        .service-price {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
            color: #28a745;
        }

        .service-title {
            font-size: 0.98rem;
            color: #0f2c60;
            line-height: 1.35;
        }

        .receipt-section {
            background: #f8f9fa;
            padding: 30px;
            border-top: 1px solid #e9ecef;
        }

        .receipt-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .receipt-title::before {
            content: '📄';
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #dee2e6;
            font-size: 1rem;
        }

        .receipt-item:last-child {
            border-bottom: none;
        }

        .item-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .item-details {
            flex: 1;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 15px;
        }

        .quantity-btn {
            background: #6c757d;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .quantity-btn:hover {
            background: #5a6268;
        }

        .quantity-display {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
        }

        .receipt-total {
            font-size: 1.3rem;
            font-weight: bold;
            color: #28a745;
            margin-top: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #28a745;
            color: white;
        }

        .btn-primary:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: #6c757d;
            padding: 40px 20px;
        }

        .empty-state::before {
            content: '🛒';
            display: block;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .service-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

            <div id="receiptTotal" class="receipt-total" style="display: none;">

            </div>
            <div class="controls">

                <button class="btn btn-primary" onclick="printDocument('QUOTATION')">🖨️ Print Quotation</button>
                <button class="btn btn-primary" onclick="printDocument('RECEIPT')">🧾 Print Receipt</button>
            </div>
        </div>
    </div>

        var receiptItems = [];
        var initialQuotationNumber = 202312170000000;
        var initialReceiptNumber = 1217202300000;
        var currentQuotationNumber = loadStoredNumber('quotationNumber', initialQuotationNumber);
        var currentReceiptNumber = loadStoredNumber('receiptNumber', initialReceiptNumber);

        function loadStoredNumber(key, fallback) {
            try {
                var saved = localStorage.getItem(key);
                return saved !== null ? Number(saved) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function saveStoredNumbers() {
            try {
                localStorage.setItem('quotationNumber', String(currentQuotationNumber));
                localStorage.setItem('receiptNumber', String(currentReceiptNumber));
            } catch (error) {
                // ignore storage errors
            }
        }

        function updateNumberFields() {
            var quotationInput = document.getElementById('quotationNumber');
            var receiptInput = document.getElementById('receiptNumber');
            if (quotationInput) {
                quotationInput.value = currentQuotationNumber;
            }
            if (receiptInput) {
                receiptInput.value = currentReceiptNumber;
            }
        }

        function getDocumentNumber(docType) {
            return docType === 'RECEIPT' ? currentReceiptNumber : currentQuotationNumber;
        }

        function incrementDocumentNumber(docType) {
            if (docType === 'RECEIPT') {
                currentReceiptNumber += 1;
            } else {
                currentQuotationNumber += 1;
            }
            saveStoredNumbers();
            updateNumberFields();
        }

        function formatPrice(value) {
            if (typeof value === 'number') {
                return '₱' + value.toFixed(2);
            }
            var numeric = parseFloat(String(value).replace(/[^0-9.-]+/g, ''));
            return '₱' + numeric.toFixed(2);
        }

        function getPriceValue(item) {
            if (typeof item.price === 'number') {
                return item.price;
            }
            return parseFloat(String(item.price).replace(/[^0-9.-]+/g, '')) || 0;
        }

        // Calculate selected fees
        function calculateFees() {
            var totalFees = 0;
            
            if (document.getElementById('feeReservation').checked) {
                totalFees += 200;
            }
            if (document.getElementById('feeCancellation').checked) {
                totalFees += 250;
            }
            if (document.getElementById('feeLate').checked) {
                var selectedLateFee = document.querySelector('input[name="lateFee"]:checked');
                if (selectedLateFee) {
                    totalFees += parseInt(selectedLateFee.value);
                }
            }
            if (document.getElementById('feeLateNight').checked) {
                totalFees += 300;
            }
            if (document.getElementById('feeLastMinute').checked) {
                totalFees += 200;
            }
            if (document.getElementById('feeHomeService').checked) {
                totalFees += 500;
            }
            if (document.getElementById('feeTransportation').checked) {
                var transportAmount = parseFloat(document.getElementById('transportationAmount').value) || 0;
                totalFees += transportAmount;
            }
            
            return totalFees;
        }

        function hasSelectedFees() {
            return document.getElementById('feeReservation').checked
                || document.getElementById('feeCancellation').checked
                || (document.getElementById('feeLate').checked && document.querySelector('input[name="lateFee"]:checked') !== null)
                || document.getElementById('feeLateNight').checked
                || document.getElementById('feeLastMinute').checked
                || document.getElementById('feeHomeService').checked
                || document.getElementById('feeTransportation').checked;
        }

        // Update receipt with fees
        function updateTotalWithFees() {
            renderReceipt();
        }

        // Initialize the app
        function init() {
            renderServices();
            updateNumberFields();
        }

        // Render service buttons
        function renderServices() {
            var serviceGrid = document.getElementById('serviceGrid');
            serviceGrid.innerHTML = '';
            for (var i = 0; i < services.length; i++) {
                var category = services[i];
                var categoryHtml = '<div class="category">';
                categoryHtml += '<h3>' + category.category + '</h3>';
                categoryHtml += '<div class="category-items">';
                for (var j = 0; j < category.items.length; j++) {
                    var item = category.items[j];
                    categoryHtml += '<div class="service-btn" onclick="toggleService(' + item.id + ')" data-id="' + item.id + '">';
                    categoryHtml += '<div class="service-title">' +  ' (' + item.name + ')</div>';
                    categoryHtml += '<div class="service-price">' + formatPrice(item.price) + '</div>';
                    categoryHtml += '</div>';
                }
                categoryHtml += '</div>';
                categoryHtml += '</div>';
                serviceGrid.innerHTML += categoryHtml;
            }
        }

        // Toggle service on/off
        function toggleService(serviceId) {
            var service = null;
            for (var i = 0; i < services.length; i++) {
                for (var j = 0; j < services[i].items.length; j++) {
                    if (services[i].items[j].id === serviceId) {
                        service = services[i].items[j];
                        break;
                    }
                }
                if (service) {
                    break;
                }
            }
            var existingIndex = -1;
            for (var k = 0; k < receiptItems.length; k++) {
                if (receiptItems[k].id === serviceId) {
                    existingIndex = k;
                    break;
                }
            }

            if (existingIndex > -1) {
                // Remove from receipt
                receiptItems.splice(existingIndex, 1);
                document.querySelector('[data-id="' + serviceId + '"]').classList.remove('active');
            } else if (service) {
                // Add to receipt
                receiptItems.push({
                    id: service.id,
                    name: service.name,
                    price: getPriceValue(service),
                    quantity: 1
                });
                document.querySelector('[data-id="' + serviceId + '"]').classList.add('active');
            }

            renderReceipt();

        }


        // Change quantity of a service
        function changeQuantity(serviceId, delta) {
            for (var i = 0; i < receiptItems.length; i++) {
                if (receiptItems[i].id === serviceId) {
                    receiptItems[i].quantity += delta;
                    if (receiptItems[i].quantity <= 0) {
                        receiptItems.splice(i, 1);
                        document.querySelector('[data-id="' + serviceId + '"]').classList.remove('active');
                    }
                    break;
                }
            }
            renderReceipt();
        }

        // Render receipt
        function renderReceipt() {
            var receiptItemsEl = document.getElementById('receiptItems');
            var receiptTotalEl = document.getElementById('receiptTotal');
            var totalAmountEl = document.getElementById('totalAmount');
            var hasFees = hasSelectedFees();

            if (receiptItems.length === 0 && !hasFees) {
                receiptItemsEl.innerHTML = `
                    <div class="empty-state">
                        <div>No services selected yet</div>
                        <div style="font-size: 0.9rem; margin-top: 10px;">Click on services above to add them to your receipt</div>
                    </div>
                `;
                receiptTotalEl.style.display = 'none';
                return;
            }

            // Calculate totals
            var subtotal = 0;
            for (var i = 0; i < receiptItems.length; i++) {
                subtotal += receiptItems[i].price * receiptItems[i].quantity;
            }

            // Calculate fees
            var fees = calculateFees();

            var tax = (subtotal + fees) * 0.08; // 8% tax on subtotal + fees
            var total = subtotal + fees + tax;

            var receiptHtml = '';
            for (var j = 0; j < receiptItems.length; j++) {
                var item = receiptItems[j];
                receiptHtml += `
                    <div class="receipt-item">
                        <div class="item-info">
                            <div>${item.name}</div>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                                <span class="quantity-display">${item.quantity}</span>
                                <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <span>${formatPrice(item.price * item.quantity)}</span>
                    </div>
                `;
            }

            // Add fees to receipt display
            var feesHtml = '';
            if (document.getElementById('feeReservation').checked) {
                feesHtml += `<div class="receipt-item"><span>Reservation Fee</span><span>₱200.00</span></div>`;
            }
            if (document.getElementById('feeCancellation').checked) {
                feesHtml += `<div class="receipt-item"><span>Cancellation Fee</span><span>₱250.00</span></div>`;
            }
            if (document.getElementById('feeLate').checked) {
                var selectedLateFee = document.querySelector('input[name="lateFee"]:checked');
                if (selectedLateFee) {
                    var lateFeeValue = parseInt(selectedLateFee.value);
                    feesHtml += `<div class="receipt-item"><span>Late Fee</span><span>₱${lateFeeValue}.00</span></div>`;
                }
            }
            if (document.getElementById('feeLateNight').checked) {
                feesHtml += `<div class="receipt-item"><span>Late Night Glam Fee</span><span>₱300.00</span></div>`;
            }
            if (document.getElementById('feeLastMinute').checked) {
                feesHtml += `<div class="receipt-item"><span>Last Minute Booking Fee</span><span>₱200.00</span></div>`;
            }
            if (document.getElementById('feeHomeService').checked) {
                feesHtml += `<div class="receipt-item"><span>Home Service Fee</span><span>₱500.00</span></div>`;
            }
            if (document.getElementById('feeTransportation').checked) {
                var transportAmount = parseFloat(document.getElementById('transportationAmount').value) || 0;
                feesHtml += `<div class="receipt-item"><span>Transportation Fee</span><span>₱${transportAmount.toFixed(2)}</span></div>`;
            }

            receiptItemsEl.innerHTML = receiptHtml + feesHtml + `
                <div class="receipt-item">
                    <span><strong>Subtotal</strong></span>
                    <span><strong>${formatPrice(subtotal + fees)}</strong></span>
                </div>
                <div class="receipt-item">
                    <span>Tax (8%)</span>
                    <span>${formatPrice(tax)}</span>
                </div>
            `;

            totalAmountEl.textContent = total.toFixed(2);
            receiptTotalEl.style.display = 'block';
        }

        // Clear all items
        function clearReceipt() {
            receiptItems = [];
            var buttons = document.querySelectorAll('.service-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            renderReceipt();
        }
